---
name: Release
on:
  push:
    branches:
      - main
    paths:
      - apps/odysseus/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: odysseus

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set date tag
        id: date
        run: echo "tag=v$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and Push
        env:
          REGISTRY: ${{ env.REGISTRY }}
          REPO_OWNER: ${{ github.repository_owner }}
          APP: ${{ env.IMAGE_NAME }}
          DATE_TAG: ${{ steps.date.outputs.tag }}
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          source: apps/odysseus
          set: |
            image-all.platform=linux/amd64,linux/arm64
            image-all.output=type=registry,push=true,compression=zstd,force-compression=true
